<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Финансовый борт</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f2;
      --panel: #ffffff;
      --ink: #20251f;
      --muted: #687066;
      --accent: #1f5f8b;
      --line: #d9ddd6;
      --danger: #b3261e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(440px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 18px 60px rgba(31, 36, 33, 0.12);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 16px;
      color: var(--ink);
      background: #fff;
    }
    button {
      width: 100%;
      height: 44px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }
    .error {
      min-height: 22px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main>
    <h1>Финансовый борт</h1>
    <p>Дашборд зашифрован. Введите пароль, чтобы открыть актуальный снимок.</p>
    <form id="unlock">
      <label for="password">Пароль</label>
      <input id="password" type="password" autocomplete="current-password" autofocus>
      <button id="button" type="submit">Открыть дашборд</button>
      <div id="error" class="error" role="status"></div>
    </form>
  </main>

        false,
        ["deriveKey"],
      );
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations: payload.iterations,
          hash: "SHA-256",
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"],
      );
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      error.textContent = "";
      button.disabled = true;
      button.textContent = "Открываю...";

      try {
        const key = await deriveKey(passwordInput.value, fromBase64(payload.salt));
        const plaintext = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: fromBase64(payload.iv) },
          key,
          fromBase64(payload.data),
        );
        document.open();
        document.write(decoder.decode(plaintext));
        document.close();
      } catch {
        error.textContent = "Пароль не подошёл. Проверь регистр и дефисы.";
      } finally {
        button.disabled = false;
        button.textContent = "Открыть дашборд";
      }
    });
  </script>
</body>
</html>
